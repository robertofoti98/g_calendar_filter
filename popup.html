<!DOCTYPE html>
<html>
	<head>
		<style>
			body {
				width: 250px;
				padding: 15px;
				padding-top: 0;
				font-family: sans-serif;
			}
			input {
				width: 100%;
				padding: 12px;
				margin-bottom: 10px;
				box-sizing: border-box;
			}
			.action-container {
				display: flex;
				flex-direction: row;
				justify-content: space-between;
				gap: 5px;
			}
			button {
				width: 100%;
				padding: 12px;
				cursor: pointer;
				background: #4285f4;
				color: white;
				border: none;
				border-radius: 8px;
			}
			#filterBtn:hover {
				background: #357ae8;
			}
			.reset {
				background: #f1f1f1;
				color: #333;
			}
			.reset:hover {
				background: #e2e2e2;
			}
		</style>
	</head>
	<body>
		<h3>Filter Events</h3>
		<input type="text" id="keyword" placeholder="Enter keyword..." />
		<div class="action-container">
			<button id="filterBtn">Apply</button>
			<button id="resetBtn" class="reset">Clear</button>
		</div>
		<script src="popup.js"></script>
	</body>
</html>
